<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ sv }}">
</head>
<body>
  <main class="page auth-page">
    <section class="panel auth-window">
      <h1>账户登录</h1>
      <p class="meta-line">登录后可查看下载自己的任务。</p>

      <div class="auth-tabs">
        <button id="tab-login" class="tab-btn active" type="button">登录</button>
        <button id="tab-register" class="tab-btn" type="button">注册</button>
      </div>

      <p id="auth-message" class="submit-message"></p>

      <form id="login-form" class="form auth-form">
        <label class="field">
          <span>用户名</span>
          <input id="login-username" type="text" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input id="login-password" type="password" required>
        </label>
        <div class="actions">
          <button id="login-btn" type="submit">登录</button>
        </div>
      </form>

      <form id="register-form" class="form auth-form hidden">
        <label class="field">
          <span>用户名</span>
          <input id="register-username" type="text" minlength="3" required>
          <small>至少 3 个字符</small>
        </label>
        <label class="field">
          <span>密码</span>
          <input id="register-password" type="password" minlength="6" required>
          <small>至少 6 个字符</small>
        </label>
        <div class="actions">
          <button id="register-btn" type="submit">注册</button>
        </div>
      </form>
    </section>
  </main>
  <script src="/static/login.js?v={{ sv }}"></script>
</body>
</html>
